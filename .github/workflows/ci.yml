name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          export HOMEBREW_BUNDLE_MAS_SKIP=$(cat .Brewfile | grep -v brew | grep -E "^mas" | sed 's/^mas "\(.*\)".*$/\1/' | tr '\n' ' ')
          make